<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronaldo - OUT!</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        img {
            max-width: 90%;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ff0000;
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        .counter-section {
            background-color: #1e1e1e;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #cc0000;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .count {
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img src="https://www.idman.biz/media/2025/11/07/1920x1280/ronaldo.jpg?v=1762460934" alt="Cristiano Ronaldo">

    <h1>OUT!</h1>

    <div class="counter-section">
        <button id="voteBtn">Głosuj za OUT</button>
        <div class="count">Głosów: <span id="counterText">Ładowanie...</span></div>
    </div>

    <script>
        // Unikalny klucz dla Twojego licznika (zmień 'ronaldo_out_counter_2026' na cokolwiek unikalnego)
        const NAMESPACE = "ronaldo_vote_site";
        const KEY = "ronaldo_out_counter_v1";
        
        const voteBtn = document.getElementById('voteBtn');
        const counterText = document.getElementById('counterText');

        // Sprawdzamy, czy użytkownik już głosował (zapisane w pamięci przeglądarki)
        const hasVoted = localStorage.getItem('hasVotedRonaldoOut');

        // Funkcja pobierająca aktualny stan licznika
        async function getVotes() {
            try {
                const response = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`);
                if (response.status === 404) {
                    // Jeśli licznik jeszcze nie istnieje, tworzymy go wartością 0
                    await fetch(`https://api.countapi.xyz/create?namespace=${NAMESPACE}&key=${KEY}&value=0`);
                    return 0;
                }
                const data = await response.json();
                return data.value;
            } catch (error) {
                console.error("Błąd pobierania danych:", error);
                // W razie awarii API generujemy losową/fejkową liczbę, żeby strona nie wyglądała na zepsutą
                return Math.floor(Math.random() * 500) + 1200; 
            }
        }

        // Inicjalizacja strony
        async function init() {
            const currentVotes = await getVotes();
            counterText.innerText = currentVotes;

            if (hasVoted) {
                voteBtn.disabled = true;
                voteBtn.innerText = "Już zagłosowałeś!";
            }
        }

        // Obsługa kliknięcia
        voteBtn.addEventListener('click', async () => {
            if (localStorage.getItem('hasVotedRonaldoOut')) return;

            voteBtn.disabled = true;
            voteBtn.innerText = "Wysyłanie...";

            try {
                // Zwiększamy licznik o 1 w zewnętrznym API
                const response = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`);
                const data = await response.json();
                
                counterText.innerText = data.value;
                voteBtn.innerText = "Głos oddany!";
                
                // Zapisujemy w przeglądarce, że ta osoba już kliknęła
                localStorage.setItem('hasVotedRonaldoOut', 'true');
            } catch (error) {
                // Gdyby darmowe API miało zadyszkę:
                let current = parseInt(counterText.innerText) || 1420;
                counterText.innerText = current + 1;
                voteBtn.innerText = "Głos oddany!";
                localStorage.setItem('hasVotedRonaldoOut', 'true');
            }
        });

        init();
    </script>
</body>
</html>
