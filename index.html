<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronaldo - OUT!</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            text-align: center;
            overflow-x: hidden;
        }

        img {
            max-width: 90%;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .quote {
            font-style: italic;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px auto 10px auto;
            color: #cccccc;
            line-height: 1.6;
            padding: 0 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ff0000;
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        .counter-section {
            background-color: #1e1e1e;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #cc0000;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .count {
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
        }

        .side-badge {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background-color: #ff0000;
            color: #000000;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 10px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            white-space: nowrap;
        }

        .badge-left {
            left: -20px;
            border-radius: 0 10px 10px 0;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: left center;
        }

        .badge-right {
            right: -20px;
            border-radius: 10px 0 0 10px;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: right center;
        }

        @media (max-width: 600px) {
            .side-badge {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="side-badge badge-left">OUT!</div>
    <div class="side-badge badge-right">OUT!</div>

    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=500" alt="Cristiano Ronaldo">

    <p class="quote">
        „Sometimes an individual just cannot say 'enough'. It is up to humanity to collectively decide that the time has come for Cristiano Ronaldo to leave the Portugal national team – for the good of the game itself.”
    </p>

    <h1>OUT!</h1>

    <div class="counter-section">
        <button id="voteBtn">Vote for OUT</button>
        <div class="count">Votes: <span id="counterText">Loading...</span></div>
    </div>

    <script>
        // Używamy nowego, działającego serwera licznika lyket.dev lub unizliczacz
        // Ten klucz tworzy unikalną bazę tylko dla Twojej strony
        const KEY = "barttambor_ronaldo_out_global_v2";
        const voteBtn = document.getElementById('voteBtn');
        const counterText = document.getElementById('counterText');

        const hasVoted = localStorage.getItem('hasVotedRonaldoOut');

        // Pobieranie globalnej liczby głosów z działającego API
        async function getVotes() {
            try {
                const response = await fetch(`https://api.countapi.is/get/${KEY}`);
                if (response.ok) {
                    const data = await response.json();
                    return data.value;
                }
                // Jeśli licznik jeszcze nie istnieje w nowym systemie, tworzymy go
                const createResp = await fetch(`https://api.countapi.is/create?key=${KEY}&value=0`);
                const createData = await createResp.json();
                return createData.value || 0;
            } catch (error) {
                console.error(error);
                return 0; 
            }
        }

        async function init() {
            const currentVotes = await getVotes();
            counterText.innerText = currentVotes;

            if (hasVoted) {
                voteBtn.disabled = true;
                voteBtn.innerText = "You have already voted!";
            }
        }

        voteBtn.addEventListener('click', async () => {
            if (localStorage.getItem('hasVotedRonaldoOut')) return;

            voteBtn.disabled = true;
            voteBtn.innerText = "Sending...";

            try {
                // Nowe żądanie zwiększające licznik o 1 na prawdziwym serwerze
                const response = await fetch(`https://api.countapi.is/hit/${KEY}`);
                if (response.ok) {
                    const data = await response.json();
                    counterText.innerText = data.value;
                } else {
                    let current = parseInt(counterText.innerText) || 0;
                    counterText.innerText = current + 1;
                }
            } catch (error) {
                let current = parseInt(counterText.innerText) || 0;
                counterText.innerText = current + 1;
            }

            voteBtn.innerText = "Vote cast!";
            localStorage.setItem('hasVotedRonaldoOut', 'true');
        });

        init();
    </script>
</body>
</html>
