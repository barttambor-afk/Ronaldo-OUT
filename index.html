<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronaldo - OUT!</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            text-align: center;
            overflow-x: hidden;
        }

        img {
            max-width: 90%;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .quote {
            font-style: italic;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px auto 10px auto;
            color: #cccccc;
            line-height: 1.6;
            padding: 0 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ff0000;
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        .counter-section {
            background-color: #1e1e1e;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #cc0000;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .count {
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
        }

        .side-badge {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background-color: #ff0000;
            color: #000000;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 10px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            white-space: nowrap;
        }

        .badge-left {
            left: -20px;
            border-radius: 0 10px 10px 0;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: left center;
        }

        .badge-right {
            right: -20px;
            border-radius: 10px 0 0 10px;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: right center;
        }

        @media (max-width: 600px) {
            .side-badge {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="side-badge badge-left">OUT!</div>
    <div class="side-badge badge-right">OUT!</div>

    <!-- Twoje nowe zaktualizowane zdjęcie -->
    <img src="https://www.idman.biz/media/2025/11/07/1920x1280/ronaldo.jpg?v=1762460934" alt="Cristiano Ronaldo">

    <p class="quote">
        „Sometimes an individual just cannot say 'enough'. It is up to humanity to collectively decide that the time has come for Cristiano Ronaldo to leave the Portugal national team – for the good of the game itself.”
    </p>

    <h1>OUT!</h1>

    <div class="counter-section">
        <button id="voteBtn">Vote for OUT</button>
        <div class="count">Votes: <span id="counterText">Loading...</span></div>
    </div>

    <script>
        // Oficjalne i stabilne API do zliczania głosów
        const ID = "barttambor_ronaldo_out_global_real";
        const voteBtn = document.getElementById('voteBtn');
        const counterText = document.getElementById('counterText');
        
        // Zmieniony klucz, aby po aktualizacji kodu przycisk znowu się odblokował do testu
        const STORAGE_KEY = "hasVotedRonaldoOutRealFix";
        const hasVoted = localStorage.getItem(STORAGE_KEY);

        async function getVotes() {
            try {
                const response = await fetch(`https://api.counterapi.dev/v1/${ID}/votes`);
                if (response.ok) {
                    const data = await response.json();
                    return data.count || 0;
                }
                // Jeśli licznik jeszcze nie istnieje na tym serwerze, zostanie stworzony przy pierwszym "hit"
                return 0;
            } catch (error) {
                console.error(error);
                return 0;
            }
        }

        async function init() {
            const currentVotes = await getVotes();
            counterText.innerText = currentVotes;

            if (hasVoted) {
                voteBtn.disabled = true;
                voteBtn.innerText = "You have already voted!";
            }
        }

        voteBtn.addEventListener('click', async () => {
            if (localStorage.getItem(STORAGE_KEY)) return;

            voteBtn.disabled = true;
            voteBtn.innerText = "Sending...";

            try {
                // Zapytanie zwiększające licznik o 1
                const response = await fetch(`https://api.counterapi.dev/v1/${ID}/votes/up`);
                if (response.ok) {
                    const data = await response.json();
                    counterText.innerText = data.count;
                    voteBtn.innerText = "Vote cast!";
                    localStorage.setItem(STORAGE_KEY, 'true');
                } else {
                    throw new Error("API error");
                }
            } catch (error) {
                voteBtn.disabled = false;
                voteBtn.innerText = "Vote for OUT";
                alert("Server connection issue. Please try again!");
            }
        });

        init();
    </script>
</body>
</html>
